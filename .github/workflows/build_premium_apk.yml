name: Build Premium APK

on:
    push:
        branches:
            - master
    workflow_dispatch:

jobs:
    build:
        name: Build Premium APK
        runs-on: ubuntu-latest

        steps:
            -   name: Checkout code
                uses: actions/checkout@v4

            -   name: Set up JDK
                uses: actions/setup-java@v4
                with:
                    distribution: 'temurin'
                    java-version: '17'
                    cache: 'gradle'

            -   name: Cache Gradle dependencies
                uses: actions/cache@v4
                with:
                    path: ~/.gradle/caches
                    key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*') }}
                    restore-keys: |
                        ${{ runner.os }}-gradle-

            -   name: Extract Version Name and Version Code
                run: |
                    VERSION_NAME=$(cat app/build.gradle | grep -oP 'versionName "\K[^"]*')
                    VERSION_CODE=$(cat app/build.gradle | grep -oP 'versionCode \K\d+')
                    echo "VERSION_NAME=$VERSION_NAME" >> $GITHUB_ENV
                    echo "VERSION_CODE=$VERSION_CODE" >> $GITHUB_ENV

            -   name: Accept Android SDK licenses
                run: yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --licenses

            -   name: Build Debug APK (Premium Unlocked)
                run: |
                    chmod +x ./gradlew
                    ./gradlew clean assembleGithubDebug
                    mv app/build/outputs/apk/github/debug/app-github-debug.apk ${{ runner.temp }}/InurePremium_Debug.apk

            -   name: Create GitHub Release
                uses: softprops/action-gh-release@v2
                with:
                    files: ${{ runner.temp }}/InurePremium_Debug.apk
                    name: Premium ${{ env.VERSION_NAME }}
                    tag_name: premium-${{ env.VERSION_NAME }}
                    body: |
                        ## InurePremium — Version ${{ env.VERSION_NAME }}
                        - Premium features fully unlocked
                        - Debug build (no root/signing required)
                        - Auto-built from latest source
                    prerelease: false
                    make_latest: true
                env:
                    GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

            -   name: Upload APK as Artifact
                uses: actions/upload-artifact@v4
                with:
                    name: InurePremium-${{ env.VERSION_NAME }}
                    path: ${{ runner.temp }}/InurePremium_Debug.apk
